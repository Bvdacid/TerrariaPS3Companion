name: Build SPRX (FAST CACHE)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Install deps
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 wget curl tar xz-utils \
            libelf-dev libgmp-dev libmpfr-dev libmpc-dev

      # ----------------------------
      # Cache FULL toolchain directory (REAL SPEED BOOST)
      # ----------------------------
      - name: Cache PS3DEV Toolchain
        id: cache-ps3
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/ps3dev
          key: ps3dev-full-v1

      # ----------------------------
      # Build toolchain ONLY if missing
      # ----------------------------
      - name: Build PS3 Toolchain (only if needed)
        if: steps.cache-ps3.outputs.cache-hit != 'true'
        run: |
          mkdir -p $PS3DEV
          git clone --depth 1 --recursive https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain

          export PS3DEV=${{ github.workspace }}/ps3dev
          export PSL1GHT=${{ github.workspace }}/ps3dev
          export MAKEFLAGS="-j$(nproc)"

          ./toolchain.sh

      # ----------------------------
      # Setup environment (ALWAYS)
      # ----------------------------
      - name: Setup environment
        run: |
          echo "PS3DEV=${{ github.workspace }}/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=${{ github.workspace }}/ps3dev" >> $GITHUB_ENV

          echo "${{ github.workspace }}/ps3dev/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "${{ github.workspace }}/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # Verify compiler
      # ----------------------------
      - name: Verify toolchain
        run: |
          which ppu-lv2-gcc
          ppu-lv2-gcc --version

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: |
          make

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
