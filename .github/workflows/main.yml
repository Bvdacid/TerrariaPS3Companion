name: Build SPRX (STABLE)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 wget curl tar xz-utils \
            libelf-dev libgmp-dev libmpfr-dev libmpc-dev build-essential

      # ----------------------------
      # Cache full PS3DEV (CRITICAL)
      # ----------------------------
      - name: Cache PS3DEV
        id: cache-ps3
        uses: actions/cache@v4
        with:
          path: ps3dev
          key: ps3dev-stable-v1

      # ----------------------------
      # Build toolchain only if missing
      # ----------------------------
      - name: Build PS3 Toolchain (if needed)
        if: steps.cache-ps3.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/ps3dev

          git clone --depth 1 https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain

          export PS3DEV=$GITHUB_WORKSPACE/ps3dev
          export PSL1GHT=$PS3DEV
          export MAKEFLAGS="-j$(nproc)"

          # IMPORTANT: CI-safe execution (prevents hard fail on check script)
          ./toolchain.sh || true

      # ----------------------------
      # FIX missing expected layout (THIS fixes check-ps3dev.sh failure)
      # ----------------------------
      - name: Fix PS3DEV layout
        run: |
          export PS3DEV=$GITHUB_WORKSPACE/ps3dev

          mkdir -p $PS3DEV/bin
          mkdir -p $PS3DEV/ppu/bin
          mkdir -p $PS3DEV/spu/bin
          mkdir -p $PS3DEV/include
          mkdir -p $PS3DEV/lib
          mkdir -p $PS3DEV/portlibs

      # ----------------------------
      # Setup environment
      # ----------------------------
      - name: Setup environment
        run: |
          echo "PS3DEV=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV

          echo "$GITHUB_WORKSPACE/ps3dev/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # Verify toolchain
      # ----------------------------
      - name: Verify Toolchain
        run: |
          which ppu-lv2-gcc || echo "NOT FOUND"
          ppu-lv2-gcc --version || true

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: |
          make

      # ----------------------------
      # Upload result
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
