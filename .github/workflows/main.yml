name: Build SPRX (FAST)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Install dependencies
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 wget curl tar xz-utils \
            libelf-dev libgmp-dev libmpfr-dev libmpc-dev

      # ----------------------------
      # Cache prebuilt toolchain archive
      # ----------------------------
      - name: Cache PS3 Toolchain
        uses: actions/cache@v4
        with:
          path: ps3dev.tar.gz
          key: ps3-prebuilt-toolchain-v1

      # ----------------------------
      # Download toolchain if missing
      # ----------------------------
      - name: Fetch Prebuilt Toolchain
        run: |
          if [ ! -f ps3dev.tar.gz ]; then
            echo "Downloading PS3 toolchain..."
            wget -O ps3dev.tar.gz https://github.com/ps3dev/ps3toolchain/releases/download/prebuilt/ps3dev.tar.gz
          else
            echo "Using cached toolchain archive"
          fi

      # ----------------------------
      # Extract toolchain
      # ----------------------------
      - name: Setup Toolchain
        run: |
          mkdir -p $GITHUB_WORKSPACE/ps3dev
          tar -xzf ps3dev.tar.gz -C $GITHUB_WORKSPACE

          echo "PS3DEV=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV

          echo "$GITHUB_WORKSPACE/ps3dev/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # Verify compiler
      # ----------------------------
      - name: Verify Toolchain
        run: |
          which ppu-lv2-gcc || echo "NOT FOUND"
          ppu-lv2-gcc --version

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: |
          make

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
