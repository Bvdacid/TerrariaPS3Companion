name: Build SPRX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison flex gcc libelf-dev make texinfo libncurses5-dev patch python3 subversion wget zlib1g-dev libtool libtool-bin bzip2 libgmp3-dev pkg-config g++
            - name: Build PS3 Toolchain
        run: |
          sudo mkdir -p /usr/local/ps3dev
          sudo chmod 777 /usr/local/ps3dev
          # Set variables for the current shell session
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=/usr/local/ps3dev
          export PATH=$PATH:$PS3DEV/bin
          # Also set them for future steps
          echo "PS3DEV=$PS3DEV" >> $GITHUB_ENV
          echo "PSL1GHT=$PSL1GHT" >> $GITHUB_ENV
          echo "$PS3DEV/bin" >> $GITHUB_PATH
          
          git clone https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain
          ./toolchain.sh

      - name: Build Plugin
        run: |
          make
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
