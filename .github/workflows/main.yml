name: Build SPRX (NO TOOLCHAIN BUILD)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Minimal dependencies
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make git wget curl tar xz-utils

      # ----------------------------
      # Cache FULL working toolchain
      # ----------------------------
      - name: Cache PS3DEV
        id: cache
        uses: actions/cache@v4
        with:
          path: ps3dev
          key: ps3dev-working-v1

      # ----------------------------
      # Download prebuilt PS3DEV (ONLY ONCE)
      # ----------------------------
      - name: Download PS3DEV (first run only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "Downloading prebuilt PS3DEV environment..."

          wget -O ps3dev.tar.gz https://example.com/ps3dev-prebuilt.tar.gz

          mkdir -p ps3dev
          tar -xzf ps3dev.tar.gz

      # ----------------------------
      # Setup environment
      # ----------------------------
      - name: Setup environment
        run: |
          echo "PS3DEV=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV

          echo "$GITHUB_WORKSPACE/ps3dev/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # HARD VERIFY (prevents silent failures)
      # ----------------------------
      - name: Verify compiler
        run: |
          which ppu-lv2-gcc || exit 1
          ppu-lv2-gcc --version

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: make

      # ----------------------------
      # Upload result
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
