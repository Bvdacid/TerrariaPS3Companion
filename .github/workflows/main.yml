name: Build SPRX
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PS3DEV: /usr/local/ps3dev
      PSL1GHT: /usr/local/ps3dev
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison flex gcc libelf-dev make texinfo libncurses5-dev patch python3 subversion wget zlib1g-dev libtool libtool-bin bzip2 libgmp3-dev pkg-config g++
      - name: Build PS3 Toolchain
        run: |
          sudo mkdir -p $PS3DEV
          sudo chmod 777 $PS3DEV
          git clone https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain
          ./toolchain.sh
        env:
          PATH: ${{ env.PATH }}:/usr/local/ps3dev/bin
      - name: Build Plugin
        run: |
          export PATH=$PATH:/usr/local/ps3dev/ppu/bin
          make
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
