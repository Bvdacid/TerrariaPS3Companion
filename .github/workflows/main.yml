name: Build SPRX (FIXED)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Dependencies
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make git python3 wget curl tar xz-utils \
            libelf-dev libgmp-dev libmpfr-dev libmpc-dev build-essential

      # ----------------------------
      # Cache PS3DEV (FAST)
      # ----------------------------
      - name: Cache PS3DEV
        id: cache-ps3
        uses: actions/cache@v4
        with:
          path: ps3dev
          key: ps3dev-fixed-v2

      # ----------------------------
      # Build toolchain ONLY if missing compiler
      # ----------------------------
      - name: Build Toolchain
        if: steps.cache-ps3.outputs.cache-hit != 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/ps3dev

          git clone --depth 1 https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain

          export PS3DEV=$GITHUB_WORKSPACE/ps3dev
          export PSL1GHT=$PS3DEV
          export MAKEFLAGS="-j$(nproc)"

          # ❗ DO NOT ignore errors
          ./toolchain.sh

      # ----------------------------
      # Setup environment
      # ----------------------------
      - name: Setup environment
        run: |
          echo "PS3DEV=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV

          echo "$GITHUB_WORKSPACE/ps3dev/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # HARD CHECK (THIS PREVENTS YOUR ERROR)
      # ----------------------------
      - name: Verify compiler exists
        run: |
          which ppu-lv2-gcc || exit 1
          ppu-lv2-gcc --version

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: |
          make

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
