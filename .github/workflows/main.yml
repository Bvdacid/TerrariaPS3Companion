name: Build SPRX (INSTANT CI)

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ----------------------------
      # Install only minimal tools
      # ----------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make git python3 wget curl

      # ----------------------------
      # FULL TOOLCHAIN CACHE (KEY SPEED)
      # ----------------------------
      - name: Cache PS3DEV
        id: cache-ps3
        uses: actions/cache@v4
        with:
          path: ps3dev
          key: ps3dev-instant-v1

      # ----------------------------
      # Build toolchain ONLY ON FIRST RUN
      # ----------------------------
      - name: Build Toolchain (only first time)
        if: steps.cache-ps3.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/ps3dev/ps3toolchain
          cd ps3toolchain

          export PS3DEV=$GITHUB_WORKSPACE/ps3dev
          export PSL1GHT=$GITHUB_WORKSPACE/ps3dev
          export MAKEFLAGS="-j$(nproc)"

          ./toolchain.sh

      # ----------------------------
      # Setup environment (always)
      # ----------------------------
      - name: Setup environment
        run: |
          echo "PS3DEV=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV
          echo "PSL1GHT=$GITHUB_WORKSPACE/ps3dev" >> $GITHUB_ENV

          echo "$GITHUB_WORKSPACE/ps3dev/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/ppu/bin" >> $GITHUB_PATH
          echo "$GITHUB_WORKSPACE/ps3dev/spu/bin" >> $GITHUB_PATH

      # ----------------------------
      # Verify compiler
      # ----------------------------
      - name: Verify toolchain
        run: |
          which ppu-lv2-gcc
          ppu-lv2-gcc --version

      # ----------------------------
      # Build plugin
      # ----------------------------
      - name: Build Plugin
        run: make

      # ----------------------------
      # Upload artifact
      # ----------------------------
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: plugin.sprx
